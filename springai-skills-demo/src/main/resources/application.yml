spring:
  application:
    name: springai-skills-demo

  ai:
    openai:
      # 配置你的 API Key (支持 OpenAI 或 Groq)
      api-key: ${OPENAI_API_KEY:your-api-key-here}
      # 使用 Groq API (兼容 OpenAI 格式)
      base-url: https://api.groq.com/openai
      chat:
        options:
          # Groq 可用模型: llama-3.3-70b-versatile, llama-3.1-8b-instant, mixtral-8x7b-32768, gemma-7b-it
          model: llama-3.3-70b-versatile
          temperature: 0.7

server:
  port: 8080

logging:
  level:
    com.example.springai: DEBUG
    org.springframework.ai: DEBUG
